// SemOps2 Knowledge Repository Schema
// Protobuf definitions for knowledge sources, processing, and retrieval

syntax = "proto3";
package semops.v1;

import "buf/validate/validate.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "semops/v1/core.proto";

// Knowledge source types supported by the system
enum SourceType {
  SOURCE_TYPE_UNSPECIFIED = 0;
  SOURCE_TYPE_WEB_CONTENT = 1;
  SOURCE_TYPE_DOCUMENTS = 2;
  SOURCE_TYPE_API_FEEDS = 3;
  SOURCE_TYPE_CODE_REPOS = 4;
  SOURCE_TYPE_MEDIA_CONTENT = 5;
  SOURCE_TYPE_INTERNAL_KNOWLEDGE = 6;
  SOURCE_TYPE_REALTIME_FEEDS = 7;
  SOURCE_TYPE_ENTERPRISE_SYSTEMS = 8;
}

// Chonkie chunking strategies
enum ChunkingStrategy {
  CHUNKING_STRATEGY_UNSPECIFIED = 0;
  CHUNKING_STRATEGY_TOKEN = 1; // Token-based chunking with tiktoken/HuggingFace
  CHUNKING_STRATEGY_SENTENCE = 2; // Sentence boundary chunking
  CHUNKING_STRATEGY_RECURSIVE = 3; // Hierarchical chunking with separators
  CHUNKING_STRATEGY_SEMANTIC = 4; // Semantic similarity-based chunking
  CHUNKING_STRATEGY_CODE = 5; // Code-aware chunking
  CHUNKING_STRATEGY_NEURAL = 6; // Transformer-based boundary detection
  CHUNKING_STRATEGY_LLM = 7; // LLM-powered context-aware chunking
}

// Processing status for sources
enum ProcessingStatus {
  PROCESSING_STATUS_UNSPECIFIED = 0;
  PROCESSING_STATUS_PENDING = 1;
  PROCESSING_STATUS_PROCESSING = 2;
  PROCESSING_STATUS_COMPLETED = 3;
  PROCESSING_STATUS_FAILED = 4;
  PROCESSING_STATUS_RETRYING = 5;
}

// Storage backend types
enum StorageBackendType {
  STORAGE_BACKEND_TYPE_UNSPECIFIED = 0;
  STORAGE_BACKEND_TYPE_VECTOR = 1;
  STORAGE_BACKEND_TYPE_GRAPH = 2;
  STORAGE_BACKEND_TYPE_HYBRID = 3;
  STORAGE_BACKEND_TYPE_MULTIMODAL = 4;
  STORAGE_BACKEND_TYPE_TIMESERIES = 5;
}

// Chunking configuration for processing pipelines
message ChunkingConfig {
  // Primary chunking strategy
  ChunkingStrategy strategy = 1 [(buf.validate.field).enum = {defined_only: true}];

  // Chunk size in tokens/characters (strategy-dependent)
  int32 chunk_size = 2 [(buf.validate.field).int32 = {
    gte: 50
    lte: 10000
  }];

  // Overlap between chunks (0-500)
  int32 overlap = 3 [(buf.validate.field).int32 = {
    gte: 0
    lte: 500
  }];

  // Similarity threshold for semantic chunking (0.0-1.0)
  float similarity_threshold = 4 [(buf.validate.field).float = {
    gte: 0.0
    lte: 1.0
  }];

  // Language for code chunking
  string language = 5;

  // Separators for recursive chunking
  repeated string separators = 6;

  // Tokenizer for token-based chunking
  string tokenizer = 7;

  // Embedding model for semantic chunking
  string embedding_model = 8;

  // Minimum chunk size
  int32 min_chunk_size = 9 [(buf.validate.field).int32 = {
    gte: 10
    lte: 1000
  }];

  // Whether to preserve structure/formatting
  bool preserve_structure = 10;

  // Whether to include surrounding context
  bool include_context = 11;

  // Context window size for semantic grouping
  int32 context_window = 12 [(buf.validate.field).int32 = {
    gte: 0
    lte: 10
  }];

  // Code-specific boundaries to respect
  repeated string respect_boundaries = 13;

  // Additional strategy-specific parameters
  google.protobuf.Struct parameters = 14;
}

// Processing pipeline configuration
message ProcessingPipeline {
  // Extractor component name
  string extractor = 1 [(buf.validate.field).string.min_len = 1];

  // Processor component name
  string processor = 2 [(buf.validate.field).string.min_len = 1];

  // Chunking configuration
  ChunkingConfig chunking = 3;

  // Enricher component names
  repeated string enrichers = 4;

  // Pipeline-specific options
  google.protobuf.Struct options = 5;
}

// Storage configuration
message StorageConfig {
  // Primary storage backend
  string primary = 1 [(buf.validate.field).string.min_len = 1];

  // Secondary storage backends
  repeated string secondary = 2;

  // Storage-specific configuration
  google.protobuf.Struct config = 3;
}

// Source type definition
message SourceTypeConfig {
  // Source type identifier
  string name = 1 [(buf.validate.field).string.min_len = 1];

  // Human-readable description
  string description = 2;

  // Icon for UI display
  string icon = 3;

  // Processing pipeline configuration
  ProcessingPipeline pipeline = 4;

  // Storage configuration
  StorageConfig storage = 5;

  // Supported protocols
  repeated string protocols = 6;

  // Supported MIME types
  repeated string mime_types = 7;

  // Additional options
  google.protobuf.Struct options = 8;
}

// Knowledge source instance
message KnowledgeSource {
  // Unique source identifier (stable hash-based)
  string source_id = 1 [(buf.validate.field).string.pattern = "^SRC-[A-Za-z0-9]+-[a-f0-9]{8}$"];

  // Source type
  SourceType source_type = 2 [(buf.validate.field).enum = {defined_only: true}];

  // Human-readable name
  string name = 3 [(buf.validate.field).string.min_len = 1];

  // Source URL or path
  string url = 4;

  // Source-specific configuration
  google.protobuf.Struct config = 5;

  // Associated domain
  EntityID domain_id = 6;

  // Processing status
  ProcessingStatus processing_status = 7;

  // Source metadata
  google.protobuf.Struct metadata = 8;

  // Creation timestamp
  google.protobuf.Timestamp created_at = 9;

  // Last processing timestamp
  google.protobuf.Timestamp last_processed = 10;

  // Processing error (if failed)
  string error_message = 11;

  // Processing metrics
  ProcessingMetrics metrics = 12;
}

// Processing metrics for monitoring
message ProcessingMetrics {
  // Number of chunks extracted
  int32 chunks_extracted = 1;

  // Total processing time in milliseconds
  int64 processing_time_ms = 2;

  // Source size in bytes
  int64 source_size_bytes = 3;

  // Number of processing retries
  int32 retry_count = 4;

  // Processing throughput (chunks/second)
  float throughput = 5;
}

// Individual content chunk
message ContentChunk {
  // Unique chunk identifier
  string chunk_id = 1 [(buf.validate.field).string.min_len = 1];

  // Source chunk content
  string content = 2 [(buf.validate.field).string.min_len = 1];

  // Source this chunk came from
  string source_id = 3;

  // Chunk position/index in source
  int32 chunk_index = 4;

  // Token count (if available)
  int32 token_count = 5;

  // Character count
  int32 char_count = 6;

  // Chunk metadata (boundaries, structure, etc.)
  google.protobuf.Struct metadata = 7;

  // Embedding vector (if computed)
  repeated float embedding = 8;

  // Chunk quality score (0.0-1.0)
  float quality_score = 9;

  // Creation timestamp
  google.protobuf.Timestamp created_at = 10;
}

// RAG retrieval request
message RetrieveKnowledgeRequest {
  // Search query
  string query = 1 [(buf.validate.field).string.min_len = 1];

  // Optional context entity for scoped search
  EntityID context_entity_id = 2;

  // Optional expert type for expert-specific retrieval
  string expert_type = 3;

  // RAG workflow to use
  string workflow = 4 [(buf.validate.field).string = {
    in: [
      "basic_semantic",
      "hybrid_search",
      "graph_enhanced",
      "multimodal_search"
    ]
  }];

  // Maximum number of results
  int32 max_results = 5 [(buf.validate.field).int32 = {
    gte: 1
    lte: 100
  }];

  // Source types to include
  repeated SourceType source_types = 6;

  // Minimum relevance score threshold
  float min_relevance_score = 7 [(buf.validate.field).float = {
    gte: 0.0
    lte: 1.0
  }];

  // Additional parameters
  google.protobuf.Struct parameters = 8;
}

// RAG retrieval response
message RetrieveKnowledgeResponse {
  // Retrieved knowledge results
  repeated KnowledgeResult results = 1;

  // Workflow used for retrieval
  string workflow_used = 2;

  // Total confidence score
  float total_confidence = 3;

  // Retrieval timestamp
  google.protobuf.Timestamp retrieved_at = 4;

  // Retrieval metrics
  RetrievalMetrics metrics = 5;
}

// Individual knowledge result
message KnowledgeResult {
  // Content text
  string content = 1;

  // Source identifier
  string source_id = 2;

  // Source type
  SourceType source_type = 3;

  // Relevance score (0.0-1.0)
  float relevance_score = 4;

  // Result metadata
  google.protobuf.Struct metadata = 5;

  // Citation format for references
  string citation_format = 6;

  // Source URL (if available)
  string source_url = 7;

  // Chunk identifiers included in result
  repeated string chunk_ids = 8;
}

// Retrieval performance metrics
message RetrievalMetrics {
  // Query processing time in milliseconds
  int64 query_time_ms = 1;

  // Number of chunks searched
  int32 chunks_searched = 2;

  // Number of results before filtering
  int32 raw_results_count = 3;

  // Number of results after filtering
  int32 filtered_results_count = 4;

  // Average relevance score
  float avg_relevance_score = 5;
}

// Source reference for citations
message KnowledgeSourceRef {
  // Source identifier
  string source_id = 1;

  // Source type
  SourceType source_type = 2;

  // Citation text
  string citation = 3;

  // Source URL
  string url = 4;

  // Reference metadata
  google.protobuf.Struct metadata = 5;
}

// Request to add a knowledge source
message AddSourceRequest {
  // Source type
  SourceType source_type = 1 [(buf.validate.field).enum = {defined_only: true}];

  // Source configuration (URL, credentials, etc.)
  google.protobuf.Struct source_config = 2;

  // Domain to associate with
  EntityID domain_id = 3;

  // Processing priority (1-10, 10=highest)
  int32 priority = 4 [(buf.validate.field).int32 = {
    gte: 1
    lte: 10
  }];

  // Force reprocessing if source exists
  bool force_reprocess = 5;
}

// Response for add source request
message AddSourceResponse {
  // Created source
  KnowledgeSource source = 1;

  // Processing job ID
  string job_id = 2;

  // Estimated processing time
  int64 estimated_time_ms = 3;
}

// Request to process a knowledge source
message ProcessSourceRequest {
  // Source to process
  string source_id = 1 [(buf.validate.field).string.min_len = 1];

  // Override chunking configuration
  ChunkingConfig chunking_override = 2;

  // Processing priority
  int32 priority = 3 [(buf.validate.field).int32 = {
    gte: 1
    lte: 10
  }];

  // Force reprocessing
  bool force_reprocess = 4;
}

// Response for process source request
message ProcessSourceResponse {
  // Processing job ID
  string job_id = 1;

  // Updated source status
  ProcessingStatus status = 2;

  // Estimated completion time
  google.protobuf.Timestamp estimated_completion = 3;
}

// Request to get processing status
message GetProcessingStatusRequest {
  // Processing job ID
  string job_id = 1 [(buf.validate.field).string.min_len = 1];

  // Include detailed metrics
  bool include_metrics = 2;
}

// Response for processing status request
message GetProcessingStatusResponse {
  // Current processing status
  ProcessingStatus status = 1;

  // Progress percentage (0-100)
  float progress_percentage = 2 [(buf.validate.field).float = {
    gte: 0.0
    lte: 100.0
  }];

  // Estimated completion time
  google.protobuf.Timestamp estimated_completion = 3;

  // Processing metrics (if requested)
  ProcessingMetrics metrics = 4;

  // Error message if status is ERROR
  string error_message = 5;
}

// Request to search knowledge
message SearchKnowledgeRequest {
  // Search query
  string query = 1 [(buf.validate.field).string.min_len = 1];

  // Search strategy
  string strategy = 2 [(buf.validate.field).string = {
    in: [
      "vector",
      "graph",
      "hybrid",
      "multimodal"
    ]
  }];

  // Source types to search
  repeated SourceType source_types = 3;

  // Maximum results
  int32 limit = 4 [(buf.validate.field).int32 = {
    gte: 1
    lte: 100
  }];

  // Additional filters
  google.protobuf.Struct filters = 5;
}

// Response for search request
message SearchKnowledgeResponse {
  // Search results
  repeated KnowledgeResult results = 1;

  // Total results available
  int32 total_results = 2;

  // Search metrics
  RetrievalMetrics metrics = 3;
}

// Request to get source status
message GetSourceStatusRequest {
  // Source identifier
  string source_id = 1 [(buf.validate.field).string.min_len = 1];

  // Include processing details
  bool include_details = 2;
}

// Response for get source status request
message GetSourceStatusResponse {
  // Source information
  KnowledgeSource source = 1;

  // Processing details (if requested)
  ProcessingDetails details = 2;
}

// Detailed processing information
message ProcessingDetails {
  // Processing stages completed
  repeated string completed_stages = 1;

  // Current processing stage
  string current_stage = 2;

  // Processing progress (0.0-1.0)
  float progress = 3;

  // Processing logs
  repeated ProcessingLogEntry logs = 4;

  // Resource usage
  ResourceUsage resource_usage = 5;
}

// Processing log entry
message ProcessingLogEntry {
  // Log timestamp
  google.protobuf.Timestamp timestamp = 1;

  // Log level
  string level = 2;

  // Log message
  string message = 3;

  // Additional context
  google.protobuf.Struct context = 4;
}

// Resource usage metrics
message ResourceUsage {
  // CPU usage percentage
  float cpu_percent = 1;

  // Memory usage in bytes
  int64 memory_bytes = 2;

  // Disk I/O in bytes
  int64 disk_io_bytes = 3;

  // Network I/O in bytes
  int64 network_io_bytes = 4;
}

// =====================================
// Knowledge Service Definitions
// =====================================

// KnowledgeService manages sources, processing, and retrieval
service KnowledgeService {
  // Source management operations
  rpc AttachSource(AttachSourceRequest) returns (AttachSourceResponse);
  rpc DetachSource(DetachSourceRequest) returns (DetachSourceResponse);
  rpc ListSources(ListSourcesRequest) returns (ListSourcesResponse);
  rpc GetSource(GetSourceRequest) returns (GetSourceResponse);
  rpc UpdateSource(UpdateSourceRequest) returns (UpdateSourceResponse);

  // Source processing operations
  rpc ProcessSource(ProcessSourceRequest) returns (ProcessSourceResponse);
  rpc GetProcessingStatus(GetProcessingStatusRequest) returns (GetProcessingStatusResponse);
  rpc CancelProcessing(CancelProcessingRequest) returns (CancelProcessingResponse);

  // Knowledge retrieval operations
  rpc RetrieveKnowledge(RetrieveKnowledgeRequest) returns (RetrieveKnowledgeResponse);
  rpc SearchKnowledge(SearchKnowledgeRequest) returns (SearchKnowledgeResponse);

  // Source inheritance and scoping
  rpc GetEffectiveSources(GetEffectiveSourcesRequest) returns (GetEffectiveSourcesResponse);
  rpc ValidateSourceConfig(ValidateSourceConfigRequest) returns (ValidateSourceConfigResponse);
}

// Request to attach a source to an entity
message AttachSourceRequest {
  // Entity to attach source to
  string entity_id = 1 [(buf.validate.field).string.min_len = 1];

  // Source type
  SourceType source_type = 2 [(buf.validate.field).enum = {defined_only: true}];

  // Source URL or identifier
  string source_url = 3 [(buf.validate.field).string.min_len = 1];

  // Source configuration (credentials, scraping options, etc.)
  google.protobuf.Struct source_config = 4;

  // Processing priority (1-10, 10=highest)
  int32 priority = 5 [(buf.validate.field).int32 = {
    gte: 1
    lte: 10
  }];

  // Force reprocessing if source exists
  bool force_reprocess = 6;

  // Override chunking configuration
  ChunkingConfig chunking_override = 7;

  // Source metadata (tags, description, etc.)
  google.protobuf.Struct metadata = 8;
}

// Response for attach source request
message AttachSourceResponse {
  // Generated source ID
  string source_id = 1;

  // Entity the source was attached to
  string entity_id = 2;

  // Processing job ID (if processing started)
  string processing_job_id = 3;

  // Source attachment status
  bool success = 4;

  // Attachment message
  string message = 5;
}

// Request to detach a source from an entity
message DetachSourceRequest {
  // Entity to detach source from
  string entity_id = 1 [(buf.validate.field).string.min_len = 1];

  // Source ID to detach
  string source_id = 2 [(buf.validate.field).string.min_len = 1];

  // Whether to delete the source entirely or just detach
  bool delete_source = 3;

  // Whether to cascade to child entities
  bool cascade = 4;
}

// Response for detach source request
message DetachSourceResponse {
  // Whether detachment was successful
  bool success = 1;

  // Detachment message
  string message = 2;

  // Number of entities affected (if cascade=true)
  int32 affected_entities = 3;
}

// Request to list sources for an entity or globally
message ListSourcesRequest {
  // Entity ID to list sources for (optional for global list)
  string entity_id = 1;

  // Source types to filter by
  repeated SourceType source_types = 2;

  // Processing status filter
  repeated ProcessingStatus statuses = 3;

  // Include inherited sources from ancestors
  bool include_inherited = 4;

  // Include effective sources (own + inherited - excluded)
  bool include_effective = 5;

  // Pagination
  Pagination pagination = 6;
}

// Response for list sources request
message ListSourcesResponse {
  // Sources attached directly to the entity
  repeated KnowledgeSource direct_sources = 1;

  // Sources inherited from parent entities
  repeated InheritedSource inherited_sources = 2;

  // Effective sources (direct + inherited - excluded)
  repeated KnowledgeSource effective_sources = 3;

  // Pagination info
  string next_page_token = 4;
  int32 total_count = 5;
}

// Source with inheritance information
message InheritedSource {
  // The knowledge source
  KnowledgeSource source = 1;

  // Entity it was inherited from
  string inherited_from_entity = 2;

  // Inheritance depth (1=parent, 2=grandparent, etc.)
  int32 inheritance_depth = 3;

  // Whether this source is excluded at current entity
  bool excluded = 4;
}

// Request to get a specific source
message GetSourceRequest {
  // Source ID to retrieve
  string source_id = 1 [(buf.validate.field).string.min_len = 1];

  // Include processing details
  bool include_processing_details = 2;

  // Include chunk statistics
  bool include_chunk_stats = 3;
}

// Response for get source request
message GetSourceResponse {
  // The knowledge source
  KnowledgeSource source = 1;

  // Processing details
  ProcessingDetails processing_details = 2;

  // Chunk statistics
  ChunkStatistics chunk_stats = 3;
}

// Request to update source configuration
message UpdateSourceRequest {
  // Source ID to update
  string source_id = 1 [(buf.validate.field).string.min_len = 1];

  // Updated source configuration
  google.protobuf.Struct source_config = 2;

  // Updated metadata
  google.protobuf.Struct metadata = 3;

  // Updated chunking configuration
  ChunkingConfig chunking_config = 4;

  // Whether to reprocess with new configuration
  bool reprocess = 5;
}

// Response for update source request
message UpdateSourceResponse {
  // Updated source
  KnowledgeSource source = 1;

  // Processing job ID (if reprocessing started)
  string processing_job_id = 2;

  // Update success status
  bool success = 3;

  // Update message
  string message = 4;
}

// Request to get effective sources for an entity
message GetEffectiveSourcesRequest {
  // Entity ID to get effective sources for
  string entity_id = 1 [(buf.validate.field).string.min_len = 1];

  // Source types to include
  repeated SourceType source_types = 2;

  // Include source provenance information
  bool include_provenance = 3;
}

// Response for get effective sources request
message GetEffectiveSourcesResponse {
  // Effective sources with provenance
  repeated EffectiveSource effective_sources = 1;

  // Source resolution summary
  SourceResolutionSummary resolution_summary = 2;
}

// Effective source with provenance information
message EffectiveSource {
  // The knowledge source
  KnowledgeSource source = 1;

  // Source provenance (how it was resolved)
  SourceProvenance provenance = 2;

  // Whether source is currently being processed
  bool processing = 3;
}

// Source provenance information
message SourceProvenance {
  // How the source was obtained
  enum ProvenanceType {
    PROVENANCE_TYPE_UNSPECIFIED = 0;
    PROVENANCE_TYPE_DIRECT = 1; // Directly attached to entity
    PROVENANCE_TYPE_INHERITED = 2; // Inherited from ancestor
    PROVENANCE_TYPE_DEFAULT = 3; // From default configuration
  }

  // Provenance type
  ProvenanceType type = 1;

  // Entity the source originated from
  string origin_entity_id = 2;

  // Path of inheritance (for inherited sources)
  repeated string inheritance_path = 3;

  // Whether source was modified at current entity
  bool modified = 4;
}

// Source resolution summary
message SourceResolutionSummary {
  // Total sources available
  int32 total_sources = 1;

  // Direct sources attached to entity
  int32 direct_sources = 2;

  // Sources inherited from ancestors
  int32 inherited_sources = 3;

  // Sources excluded at this entity
  int32 excluded_sources = 4;

  // Sources currently processing
  int32 processing_sources = 5;
}

// Request to validate source configuration
message ValidateSourceConfigRequest {
  // Source type to validate
  SourceType source_type = 1 [(buf.validate.field).enum = {defined_only: true}];

  // Source configuration to validate
  google.protobuf.Struct source_config = 2;

  // Entity context for validation
  string entity_id = 3;
}

// Response for validate source configuration
message ValidateSourceConfigResponse {
  // Whether configuration is valid
  bool valid = 1;

  // Validation errors
  repeated ValidationError errors = 2;

  // Validation warnings
  repeated ValidationWarning warnings = 3;

  // Suggested configuration improvements
  repeated string suggestions = 4;
}

// Request to cancel source processing
message CancelProcessingRequest {
  // Source ID to cancel processing for
  string source_id = 1 [(buf.validate.field).string.min_len = 1];

  // Processing job ID to cancel
  string job_id = 2;
}

// Response for cancel processing request
message CancelProcessingResponse {
  // Whether cancellation was successful
  bool success = 1;

  // Cancellation message
  string message = 2;

  // Cleanup status
  bool cleanup_completed = 3;
}

// Chunk statistics for a source
message ChunkStatistics {
  // Total number of chunks
  int32 total_chunks = 1;

  // Average chunk size in characters
  int32 avg_chunk_size = 2;

  // Chunk size distribution
  ChunkSizeDistribution size_distribution = 3;

  // Processing statistics
  ChunkProcessingStats processing_stats = 4;
}

// Chunk size distribution
message ChunkSizeDistribution {
  // Minimum chunk size
  int32 min_size = 1;

  // Maximum chunk size
  int32 max_size = 2;

  // Median chunk size
  int32 median_size = 3;

  // Standard deviation
  float std_deviation = 4;

  // Percentiles (25th, 50th, 75th, 95th)
  repeated int32 percentiles = 5;
}

// Chunk processing statistics
message ChunkProcessingStats {
  // Total processing time in milliseconds
  int64 total_processing_time_ms = 1;

  // Average processing time per chunk
  int64 avg_processing_time_per_chunk_ms = 2;

  // Successful chunks
  int32 successful_chunks = 3;

  // Failed chunks
  int32 failed_chunks = 4;

  // Retry count
  int32 total_retries = 5;
}
