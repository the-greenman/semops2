[pytest]
# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Markers for organizing tests
markers =
    unit: Unit tests (fast, no I/O, isolated)
    integration: Integration tests (uses fixtures, may do I/O)
    contract: gRPC contract tests (tests protobuf service contracts)
    cli: CLI integration tests
    e2e: End-to-end tests (slow, full stack)
    skip_until_phase0: Tests for Phase 0 features (config + adapters)
    skip_until_phase1: Tests for Phase 1 features (EntityService CRUD)
    skip_until_phase2: Tests for Phase 2 features (journeys + templates)

# Output options
addopts =
    --verbose
    --strict-markers
    --tb=short
    --color=yes
    -ra

# Coverage options (optional, uncomment when ready)
# addopts = --cov=src --cov-report=term-missing --cov-report=html

# Asyncio mode
asyncio_mode = auto

# Minimum Python version
minversion = 3.10
