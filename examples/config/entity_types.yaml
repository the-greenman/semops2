# SemOps2 Entity Type Configuration
#
# This file defines entity types, their templates/prompts, file layout,
# validation rules, and the typed relationships between them.
#
# NAMESPACE MODEL
# ---------------
# Every entity type belongs to a namespace (reverse-DNS convention).
# Fully-qualified type key: "{namespace}/{type_key}", e.g. "semops.core/decision"
#
# Built-in types use "semops.core". Third-party contributions use their own
# namespace (e.g. "com.acme.governance"). The ConfigManager rejects any
# non-builtin config that claims "semops.*".
#
# ID FORMAT
# ---------
# Display ID: "{prefix}-{slug}", e.g. "DEC-adopt-zero-trust"
# The prefix is unique within its namespace. Two namespaces may use the same
# prefix without collision because global uniqueness is namespace + slug.
#
# TEMPLATE BUNDLES
# ----------------
# Each entity type declares a bundle with named template and prompt files.
# - create:   Jinja2 template for the blank document created on `semops X create`
# - analyze:  Jinja2 template for AI-generated analysis output
# - prompts:  Named prompt text files used by the expert system and workflows


entity_types:

  # ── semops.core/domain ───────────────────────────────────────────────────
  # Bounded operational area. The primary anchor for roles, meetings,
  # decisions, and cross-domain source sharing.

  domain:
    namespace: "semops.core"
    id_prefix: "DOM"
    name_field: "domain_name"
    slug_field: "domain_slug"

    template_bundle:
      create: "domain.md.j2"
      analyze: "domain-analysis.md.j2"
      prompts:
        summarize: "prompts/domain-summarize.txt"
        identify_roles: "prompts/domain-identify-roles.txt"
        map_decisions: "prompts/domain-map-decisions.txt"

    directory_name: "domain"
    filename_pattern: "{entity_type}.md"    # → domain.md
    nesting_strategy: "root"

    required_fields: ["domain_name", "brief_description"]
    unique_fields: ["domain_name", "domain_slug"]
    context_level: 1

    list_command: true
    get_command: true
    create_command: true
    analyze_command: true
    display_name: "Domain"
    description: "Bounded operational areas with assigned roles and governance"

  # ── semops.core/library ──────────────────────────────────────────────────
  # Curated reference library of sources (URLs, PDFs, transcripts, etc.) that can
  # be linked to domains for reuse and scoped retrieval.

  library:
    namespace: "semops.core"
    id_prefix: "LIB"
    name_field: "library_name"
    slug_field: "library_slug"

    template_bundle:
      create: "library.md.j2"
      prompts:
        summarize: "prompts/library-summarize.txt"

    directory_name: "libraries"
    filename_pattern: "{entity_type}.md"
    nesting_strategy: "root"

    required_fields: ["library_name"]
    unique_fields: ["library_slug"]
    context_level: 1

    list_command: true
    get_command: true
    create_command: true
    analyze_command: false
    display_name: "Library"
    description: "Curated reference libraries of sources used for retrieval and analysis"

  # ── semops.core/role ─────────────────────────────────────────────────────
  # A person or group with defined accountability. Flat root collection;
  # roles connect to domains and meetings via relationships.

  role:
    namespace: "semops.core"
    id_prefix: "ROLE"
    name_field: "role_name"
    slug_field: "role_slug"

    template_bundle:
      create: "role.md.j2"
      prompts:
        responsibilities: "prompts/role-responsibilities.txt"
        stakeholder_map: "prompts/role-stakeholder-map.txt"

    directory_name: "roles"
    filename_pattern: "{entity_type}.md"
    nesting_strategy: "root"

    required_fields: ["role_name"]
    unique_fields: ["role_name", "role_slug"]
    context_level: 1

    list_command: true
    get_command: true
    create_command: true
    analyze_command: false
    display_name: "Role"
    description: "Accountable or responsible parties within domains and decisions"

  # ── semops.core/meeting ───────────────────────────────────────────────────
  # A recorded session that produces decisions, artefacts, and action items.

  meeting:
    namespace: "semops.core"
    id_prefix: "MTG"
    name_field: "meeting_name"
    slug_field: "meeting_slug"

    template_bundle:
      create: "meeting.md.j2"
      analyze: "meeting-analysis.md.j2"
      prompts:
        extract_decisions: "prompts/meeting-extract-decisions.txt"
        extract_actions: "prompts/meeting-extract-actions.txt"
        extract_artefacts: "prompts/meeting-extract-artefacts.txt"
        summarize: "prompts/meeting-summarize.txt"

    directory_name: "meetings"
    filename_pattern: "{entity_type}.md"
    nesting_strategy: "root"

    required_fields: ["meeting_name", "meeting_date"]
    unique_fields: ["meeting_slug"]
    context_level: 1

    list_command: true
    get_command: true
    create_command: true
    analyze_command: true
    display_name: "Meeting"
    description: "Recorded sessions that produce decisions, artefacts, and action items"

  # ── semops.core/decision ──────────────────────────────────────────────────
  # A recorded decision with rationale, status, and affected domains/roles.

  decision:
    namespace: "semops.core"
    id_prefix: "DEC"
    name_field: "decision_name"
    slug_field: "decision_slug"

    template_bundle:
      create: "decision.md.j2"
      analyze: "decision-analysis.md.j2"
      prompts:
        summarize: "prompts/decision-summarize.txt"
        extract_rationale: "prompts/decision-rationale.txt"
        relate_to_domain: "prompts/decision-relate-domain.txt"
        assess_impact: "prompts/decision-impact.txt"

    directory_name: "decisions"
    filename_pattern: "{entity_type}.md"
    nesting_strategy: "root"

    required_fields: ["decision_name", "decision_date", "status"]
    unique_fields: ["decision_slug"]
    context_level: 1

    list_command: true
    get_command: true
    create_command: true
    analyze_command: true
    display_name: "Decision"
    description: "Recorded decisions with rationale, status, and affected domains"

  # ── semops.core/conversation ──────────────────────────────────────────────
  # An informal or async exchange (Slack thread, email chain, etc.) that may
  # produce artefacts or feed into a decision.

  conversation:
    namespace: "semops.core"
    id_prefix: "CONV"
    name_field: "conversation_name"
    slug_field: "conversation_slug"

    template_bundle:
      create: "conversation.md.j2"
      prompts:
        extract_actions: "prompts/conversation-extract-actions.txt"
        extract_artefacts: "prompts/conversation-extract-artefacts.txt"
        summarize: "prompts/conversation-summarize.txt"

    directory_name: "conversations"
    filename_pattern: "{entity_type}.md"
    nesting_strategy: "root"

    required_fields: ["conversation_name"]
    unique_fields: ["conversation_slug"]
    context_level: 1

    list_command: true
    get_command: true
    create_command: true
    analyze_command: true
    display_name: "Conversation"
    description: "Informal or async exchanges that may produce artefacts or feed into decisions"

  # ── semops.core/artefact ──────────────────────────────────────────────────
  # A document, diagram, or other output produced by a meeting or conversation.

  artefact:
    namespace: "semops.core"
    id_prefix: "ART"
    name_field: "artefact_name"
    slug_field: "artefact_slug"

    template_bundle:
      create: "artefact.md.j2"
      prompts:
        summarize: "prompts/artefact-summarize.txt"
        classify: "prompts/artefact-classify.txt"

    directory_name: "artefacts"
    filename_pattern: "{entity_type}.md"
    nesting_strategy: "root"

    required_fields: ["artefact_name", "artefact_type"]
    unique_fields: ["artefact_slug"]
    context_level: 1

    list_command: true
    get_command: true
    create_command: true
    analyze_command: false
    display_name: "Artefact"
    description: "Documents, diagrams, or other outputs produced by meetings or conversations"


# ── Relationship Types ────────────────────────────────────────────────────────
#
# Typed, directed relationships between entity instances.
# Filesystem layout remains flat root collections; structure is expressed via
# these relationship types (graph-style connections).
#
# Fields:
#   namespace       - Reverse-DNS namespace owning this relationship type
#   from_types      - Fully-qualified entity types that may appear as "from"
#   to_types        - Fully-qualified entity types that may appear as "to"
#   cardinality     - many_to_one | many_to_many | one_to_one
#   required        - Whether this relationship is required on the from entity
#   share_sources   - Whether knowledge sources propagate across this edge
#   max_depth       - Maximum hops for source propagation (prevents runaway unions)
#   metadata_schema - Optional per-relationship-instance fields

relationship_types:

  # A decision was made during a specific meeting
  made_in:
    namespace: "semops.core"
    from_types: ["semops.core/decision"]
    to_types: ["semops.core/meeting"]
    cardinality: many_to_one
    required: false
    share_sources: false

  # A decision, meeting, or role belongs to a domain (soft membership)
  part_of:
    namespace: "semops.core"
    from_types:
      - "semops.core/role"
      - "semops.core/meeting"
      - "semops.core/decision"
      - "semops.core/conversation"
    to_types: ["semops.core/domain"]
    cardinality: many_to_many
    required: false
    share_sources: true           # Domain sources propagate to members
    max_depth: 1

  # A decision affects one or more domains or roles
  affects:
    namespace: "semops.core"
    from_types: ["semops.core/decision"]
    to_types: ["semops.core/domain", "semops.core/role"]
    cardinality: many_to_many
    required: false
    share_sources: false

  # A role participates in a meeting or conversation
  participates_in:
    namespace: "semops.core"
    from_types: ["semops.core/role"]
    to_types: ["semops.core/meeting", "semops.core/conversation"]
    cardinality: many_to_many
    required: false
    share_sources: false
    metadata_schema:
      - field: capacity           # e.g. "chair", "contributor", "observer"
        type: string
        required: false

  # A meeting or conversation produces an artefact
  produces:
    namespace: "semops.core"
    from_types: ["semops.core/meeting", "semops.core/conversation"]
    to_types: ["semops.core/artefact"]
    cardinality: many_to_many
    required: false
    share_sources: true           # Artefacts inherit sources from their producing session

  # An entity references an existing artefact (read-only link, no source sharing)
  references:
    namespace: "semops.core"
    from_types:
      - "semops.core/meeting"
      - "semops.core/conversation"
      - "semops.core/decision"
    to_types: ["semops.core/artefact"]
    cardinality: many_to_many
    required: false
    share_sources: false

  # A domain depends on another domain (cross-domain knowledge sharing)
  depends_on:
    namespace: "semops.core"
    from_types: ["semops.core/domain"]
    to_types: ["semops.core/domain"]
    cardinality: many_to_many
    required: false
    share_sources: true
    max_depth: 1

  # A library provides reference material for a domain
  library_for:
    namespace: "semops.core"
    from_types: ["semops.core/library"]
    to_types: ["semops.core/domain"]
    cardinality: many_to_one
    required: false
    share_sources: true          # library sources propagate into the domain's effective sources
    max_depth: 1


# ── Global Configuration ──────────────────────────────────────────────────────

configuration:
  template_engine:
    auto_escape: true
    strict_variables: true
    trim_blocks: true
    lstrip_blocks: true

  validation:
    enforce_unique_constraints: true
    validate_parent_relationships: true
    require_templates: true
    validate_frontmatter: true

  context_detection:
    max_parent_search_depth: 5     # Flat collections don't need deep search
    auto_resolve_ambiguity: true
    prefer_deeper_context: false   # All collections are at depth 1

  cli:
    auto_generate_help: true
    consistent_parameter_names: true
    context_aware_defaults: true
    format_options: ["table", "json", "yaml", "markdown"]

  # Namespace access control
  # Only the built-in loader may register types under "semops.*".
  # Third-party configs that claim protected namespaces are rejected.
  protected_namespaces:
    - "semops.*"


# ── Template Variables ────────────────────────────────────────────────────────
# Standard variables available in every template regardless of entity type.

template_variables:
  global:
    - entity_type           # Fully-qualified: "semops.core/decision"
    - entity_namespace      # "semops.core"
    - entity_type_key       # Short key: "decision"
    - entity_id             # Display ID: "DEC-adopt-zero-trust"
    - entity_name
    - entity_slug
    - template_name
    - template_version
    - creation_date
    - last_modified
