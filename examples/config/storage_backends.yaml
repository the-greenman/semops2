# SemOps2 Storage Backends Configuration
# Defines available storage systems for the knowledge repository

storage_backends:
  # =====================================
  # Vector Stores
  # =====================================

  # ChromaDB - Local persistent vector database
  chromadb:
    type: "vector"
    name: "ChromaDB"
    description: "Local persistent vector database with Python API"
    icon: "🔍"
    category: "vector"

    # Embedding Models
    embedding_models:
      default: "sentence-transformers/all-MiniLM-L6-v2"
      options:
        - "sentence-transformers/all-MiniLM-L6-v2"  # Fast, good quality
        - "sentence-transformers/all-mpnet-base-v2"  # Better quality, slower
        - "sentence-transformers/multi-qa-MiniLM-L6-cos-v1"  # QA optimized
        - "text-embedding-ada-002"  # OpenAI (requires API key)
        - "text-embedding-3-small"  # OpenAI latest

    # Configuration
    configuration:
      persist_directory: "{domain_path}/knowledge/.chromadb"
      collection_prefix: "{domain_name}"
      distance_function: "cosine"  # cosine, l2, ip
      allow_reset: false
      anonymized_telemetry: false

    # Capabilities
    capabilities:
      - "similarity_search"
      - "metadata_filtering"
      - "batch_operations"
      - "persistent_storage"

    # Performance Settings
    performance:
      default_n_results: 10
      max_batch_size: 1000
      indexing_threads: 4

    # Requirements
    requirements:
      - "chromadb>=0.4.0"
      - "sentence-transformers"

  # Pinecone - Managed vector database service
  pinecone:
    type: "vector"
    name: "Pinecone"
    description: "Managed vector database service with high performance"
    icon: "🌲"
    category: "vector"

    embedding_models:
      default: "text-embedding-ada-002"
      options:
        - "text-embedding-ada-002"
        - "text-embedding-3-small"
        - "text-embedding-3-large"

    configuration:
      api_key_env: "PINECONE_API_KEY"
      environment: "gcp-starter"  # us-east1-gcp, etc.
      index_name: "{domain_name}-knowledge"
      dimension: 1536  # For OpenAI embeddings
      metric: "cosine"  # cosine, euclidean, dotproduct
      pod_type: "p1.x1"  # Starter tier

    capabilities:
      - "similarity_search"
      - "metadata_filtering"
      - "namespaces"
      - "real_time_updates"
      - "high_availability"

    performance:
      default_n_results: 10
      max_batch_size: 100
      concurrent_requests: 10

    requirements:
      - "pinecone-client"

  # Weaviate - Multi-modal vector database
  weaviate:
    type: "vector"
    name: "Weaviate"
    description: "Multi-modal vector database with GraphQL API"
    icon: "🌊"
    category: "vector"

    embedding_models:
      default: "text2vec-openai"
      options:
        - "text2vec-openai"
        - "text2vec-huggingface"
        - "multi2vec-clip"  # Multi-modal text+image
        - "text2vec-transformers"

    configuration:
      url: "http://localhost:8080"
      api_key_env: "WEAVIATE_API_KEY"
      class_name: "{domain_name}Knowledge"
      vectorizer: "text2vec-openai"
      additional_headers: {}

    capabilities:
      - "similarity_search"
      - "hybrid_search"  # Vector + BM25
      - "multimodal_search"
      - "graphql_api"
      - "real_time_updates"

    requirements:
      - "weaviate-client"

  # =====================================
  # Graph Stores
  #
  # TWO-GRAPH MODEL
  # ---------------
  # SemOps2 maintains two separate graph stores with distinct roles:
  #
  #   role: "knowledge"  — owned by KnowledgeService
  #     Nodes: Document, Chunk, Concept, Person, Organization
  #     Edges: IMPLEMENTS, MITIGATES, CONTAINS, REFERENCES, RELATES_TO
  #     Used by: graph_enhanced RAG workflow (Cypher traversal)
  #
  #   role: "entity"     — owned by EntityService
  #     Nodes: one per EntityDocument (domain, meeting, decision, role, …)
  #     Edges: config-defined relationship types (part_of, made_in, affects, …)
  #     Used by: GetEntityRelationships RPC, entity_graph_traversal workflow
  #
  # Services locate the correct backend by role, not by key name.
  # KnowledgeService must never query entity_graph.
  # EntityService must never query knowledge_graph.
  # =====================================

  # knowledge_graph — Neo4j, production (owned by KnowledgeService)
  knowledge_graph:
    type: "graph"
    role: "knowledge"
    name: "Knowledge Graph (Neo4j)"
    description: "Document/chunk/concept graph for RAG enrichment"
    implementation: "neo4j"

    configuration:
      url: "bolt://localhost:7687"
      username_env: "NEO4J_USERNAME"
      password_env: "NEO4J_PASSWORD"
      database: "semops_knowledge"
      max_connection_lifetime: 3600
      max_connection_pool_size: 50
      connection_timeout: 30

    schema:
      node_types:
        - "Document"
        - "Chunk"
        - "Concept"
        - "Person"
        - "Organization"
      relationship_types:
        - "CONTAINS"       # Document → Chunk
        - "IMPLEMENTS"     # Concept → Concept
        - "MITIGATES"      # Control → Threat
        - "REFERENCES"     # Document → Document
        - "RELATES_TO"     # generic concept relationship
        - "CREATED_BY"     # Document → Person/Organization
        - "SIMILAR_TO"     # Chunk → Chunk (embedding similarity)

    capabilities:
      - "graph_traversal"
      - "pattern_matching"
      - "cypher_queries"
      - "centrality_analysis"
      - "community_detection"
      - "shortest_path"

    performance:
      query_timeout: 30
      batch_size: 1000
      parallel_relationships: true

    requirements:
      - "neo4j>=5.0.0"

  # entity_graph — Neo4j, production (owned by EntityService)
  entity_graph:
    type: "graph"
    role: "entity"
    name: "Entity Graph (Neo4j)"
    description: "Ops entity relationship graph (domains, decisions, meetings, roles, …)"
    implementation: "neo4j"

    configuration:
      url: "bolt://localhost:7687"
      username_env: "NEO4J_USERNAME"
      password_env: "NEO4J_PASSWORD"
      database: "semops_entities"   # separate database on same server
      max_connection_lifetime: 3600
      max_connection_pool_size: 50
      connection_timeout: 30

    schema:
      # One node type per EntityDocument. Labels are the fully-qualified type key.
      # e.g. (:Entity {entity_type: "semops.core/decision", entity_id: "DEC-..."})
      node_label: "Entity"
      node_properties:
        - "entity_id"         # display ID: "DEC-adopt-zero-trust"
        - "entity_type"       # FQ key: "semops.core/decision"
        - "namespace"         # "semops.core"
        - "slug"
        - "name"
        - "status"
        - "created_at"
        - "updated_at"
      # Edge types mirror the relationship_type keys from entity_types.yaml.
      # e.g. (:Entity)-[:PART_OF]->(:Entity)
      # Edges carry a "namespace" property for the relationship type namespace.
      relationship_properties:
        - "relationship_id"
        - "relationship_type"   # FQ key: "semops.core/part_of"
        - "namespace"
        - "status"
        - "metadata"            # JSON-serialised Struct
        - "created_at"

    capabilities:
      - "graph_traversal"
      - "pattern_matching"
      - "cypher_queries"
      - "shortest_path"

    performance:
      query_timeout: 30
      batch_size: 500

    requirements:
      - "neo4j>=5.0.0"

  # knowledge_graph_dev — NetworkX, development (owned by KnowledgeService)
  knowledge_graph_dev:
    type: "graph"
    role: "knowledge"
    name: "Knowledge Graph (NetworkX, dev)"
    description: "In-memory knowledge graph for development and testing"
    implementation: "networkx"

    configuration:
      persist_directory: "{workspace_path}/.semops/knowledge/.knowledge_graph"
      graph_format: "graphml"
      auto_save_interval: 300

    capabilities:
      - "graph_traversal"
      - "centrality_analysis"
      - "community_detection"
      - "local_analysis"
      - "graph_visualization"

    performance:
      max_nodes: 10000
      max_edges: 50000

    requirements:
      - "networkx"
      - "matplotlib"

  # entity_graph_dev — NetworkX, development (owned by EntityService)
  entity_graph_dev:
    type: "graph"
    role: "entity"
    name: "Entity Graph (NetworkX, dev)"
    description: "In-memory entity relationship graph for development and testing"
    implementation: "networkx"

    configuration:
      persist_directory: "{workspace_path}/.semops/knowledge/.entity_graph"
      graph_format: "graphml"
      auto_save_interval: 60   # more frequent — entity graph changes often

    capabilities:
      - "graph_traversal"
      - "pattern_matching"
      - "local_analysis"

    performance:
      max_nodes: 5000
      max_edges: 20000

    requirements:
      - "networkx"

  # =====================================
  # Hybrid Stores
  # =====================================

  # Elasticsearch - Full-text + vector search
  elasticsearch:
    type: "hybrid"
    name: "Elasticsearch"
    description: "Full-text search with vector capabilities"
    icon: "🔎"
    category: "hybrid"

    configuration:
      url: "http://localhost:9200"
      api_key_env: "ELASTICSEARCH_API_KEY"
      index_prefix: "{domain_name}"
      number_of_shards: 1
      number_of_replicas: 0
      refresh_interval: "1s"

    # Vector Configuration
    vector_config:
      dims: 384  # For sentence-transformers
      similarity: "cosine"
      index_options:
        type: "hnsw"
        m: 16
        ef_construction: 200

    capabilities:
      - "full_text_search"
      - "vector_search"
      - "hybrid_ranking"
      - "aggregations"
      - "real_time_indexing"
      - "distributed_search"

    requirements:
      - "elasticsearch>=8.0.0"

  # OpenSearch - Open source alternative to Elasticsearch
  opensearch:
    type: "hybrid"
    name: "OpenSearch"
    description: "Open source search and analytics suite"
    icon: "🔍"
    category: "hybrid"

    configuration:
      url: "http://localhost:9200"
      username_env: "OPENSEARCH_USERNAME"
      password_env: "OPENSEARCH_PASSWORD"
      index_prefix: "{domain_name}"
      use_ssl: false
      verify_certs: false

    capabilities:
      - "full_text_search"
      - "vector_search"
      - "hybrid_ranking"
      - "machine_learning"

    requirements:
      - "opensearch-py"

  # =====================================
  # Multi-Modal Stores
  # =====================================

  # Multimodal ChromaDB with CLIP
  multimodal_chroma:
    type: "multimodal"
    name: "Multimodal ChromaDB"
    description: "ChromaDB with CLIP embeddings for text+image search"
    icon: "🎨"
    category: "multimodal"

    embedding_models:
      text: "sentence-transformers/all-MiniLM-L6-v2"
      image: "sentence-transformers/clip-ViT-B-32"
      multimodal: "sentence-transformers/clip-ViT-B-32"

    configuration:
      persist_directory: "{domain_path}/knowledge/.multimodal_db"
      collection_prefix: "{domain_name}_mm"
      separate_modalities: false  # Single collection vs separate

    capabilities:
      - "text_search"
      - "image_search"
      - "cross_modal_search"  # Text query → Image results
      - "similarity_clustering"

    requirements:
      - "chromadb"
      - "sentence-transformers"
      - "torch"
      - "torchvision"
      - "Pillow"

  # Qdrant with multi-modal support
  qdrant:
    type: "multimodal"
    name: "Qdrant"
    description: "High-performance vector database with multi-modal support"
    icon: "⚡"
    category: "multimodal"

    configuration:
      url: "http://localhost:6333"
      api_key_env: "QDRANT_API_KEY"
      collection_name: "{domain_name}_vectors"
      vector_size: 512  # For CLIP embeddings
      distance: "Cosine"

    capabilities:
      - "vector_search"
      - "payload_indexing"
      - "multimodal_search"
      - "real_time_updates"
      - "horizontal_scaling"

    requirements:
      - "qdrant-client"

  # =====================================
  # Time Series Stores
  # =====================================

  # InfluxDB - Time series database
  influxdb:
    type: "timeseries"
    name: "InfluxDB"
    description: "Time series database for real-time data"
    icon: "📈"
    category: "timeseries"

    configuration:
      url: "http://localhost:8086"
      token_env: "INFLUXDB_TOKEN"
      org: "semops"
      bucket: "{domain_name}_knowledge"
      precision: "s"  # second precision

    capabilities:
      - "temporal_queries"
      - "aggregation"
      - "trend_analysis"
      - "downsampling"
      - "continuous_queries"

    requirements:
      - "influxdb-client"

  # =====================================
  # Specialized Stores
  # =====================================

  # Document Store - For rich document storage
  mongodb:
    type: "document"
    name: "MongoDB"
    description: "Document database for structured content"
    icon: "🍃"
    category: "document"

    configuration:
      connection_string: "mongodb://localhost:27017"
      database_name: "semops_{domain_name}"
      collection_prefix: "knowledge"
      connection_timeout: 30000

    capabilities:
      - "document_storage"
      - "flexible_schema"
      - "aggregation_pipeline"
      - "full_text_search"
      - "geospatial_queries"

    requirements:
      - "pymongo"

  # Redis - In-memory cache and real-time operations
  redis:
    type: "cache"
    name: "Redis"
    description: "In-memory cache for high-speed operations"
    icon: "🔴"
    category: "cache"

    configuration:
      url: "redis://localhost:6379"
      db: 0
      password_env: "REDIS_PASSWORD"
      connection_pool_max_connections: 50

    capabilities:
      - "caching"
      - "session_storage"
      - "real_time_analytics"
      - "pub_sub_messaging"

    requirements:
      - "redis"

# Default Storage Strategies
default_storage_strategies:
  # Strategy based on source type (knowledge graph only — entity graph is always entity_graph/entity_graph_dev)
  by_source_type:
    web_content: ["chromadb"]
    documents: ["chromadb", "knowledge_graph"]
    api_feeds: ["knowledge_graph", "elasticsearch"]
    code_repos: ["knowledge_graph", "elasticsearch"]
    knowledge_graphs: ["knowledge_graph"]
    media_content: ["multimodal_chroma"]
    internal_knowledge: ["chromadb", "knowledge_graph"]
    realtime_feeds: ["influxdb", "chromadb"]
    enterprise_systems: ["knowledge_graph", "elasticsearch"]

  # Strategy based on workspace size
  by_workspace_size:
    small:  # < 1000 documents
      vector: "chromadb"
      knowledge_graph: "knowledge_graph_dev"
      entity_graph: "entity_graph_dev"
    medium:  # 1000-10000 documents
      vector: "elasticsearch"
      knowledge_graph: "knowledge_graph"
      entity_graph: "entity_graph"
    large:  # > 10000 documents
      vector: "pinecone"
      knowledge_graph: "knowledge_graph"
      entity_graph: "entity_graph"

  # Strategy based on use case
  by_use_case:
    development:
      vector: "chromadb"
      knowledge_graph: "knowledge_graph_dev"
      entity_graph: "entity_graph_dev"
    production:
      vector: "elasticsearch"
      knowledge_graph: "knowledge_graph"
      entity_graph: "entity_graph"
    enterprise:
      vector: "pinecone"
      knowledge_graph: "knowledge_graph"
      entity_graph: "entity_graph"
    multimodal:
      vector: "multimodal_chroma"
      knowledge_graph: "knowledge_graph"
      entity_graph: "entity_graph"

# Global Storage Configuration
storage_config:
  # Connection Management
  connections:
    max_pool_size: 20
    connection_timeout: 30
    retry_attempts: 3
    health_check_interval: 60

  # Performance
  performance:
    batch_size: 100
    concurrent_operations: 4
    cache_embeddings: true
    lazy_loading: true

  # Consistency
  consistency:
    sync_across_backends: true
    conflict_resolution: "last_write_wins"
    backup_strategy: "daily"

  # Monitoring
  monitoring:
    enable_metrics: true
    log_slow_queries: true
    alert_on_failures: true