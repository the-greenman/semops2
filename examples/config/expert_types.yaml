# SemOps2 Expert Types Configuration
# Defines AI expert personas for specialized semantic analysis

expert_types:
  # Strategic Business Analysis Expert
  strategic_analyst:
    name: "Strategic Business Analyst"
    description: "Market dynamics and enterprise strategy specialist"
    icon: "📊"
    version: "2.0.0"

    # Core Expertise Areas
    expertise:
      - market_dynamics
      - competitive_forces
      - business_strategy
      - risk_assessment
      - technology_trends
      - vendor_landscape
      - enterprise_decision_patterns

    # Analysis Methodology
    analysis_approach:
      methodology: "source_driven_strategic"
      focus_areas:
        - business_impact
        - market_forces
        - strategic_implications
        - boundary_definition
        - opportunity_identification
      evidence_requirements: "high"
      confidence_reporting: true
      polarities_framework: true

    # Expert Persona Definition
    persona:
      role: "Seasoned strategic business analyst"
      specialization: "Technology market analysis and enterprise infrastructure decisions"
      background: "15+ years analyzing technology adoption patterns, vendor landscapes, and enterprise strategic decisions"
      perspective: "Top-down strategic view focusing on business value and market positioning"

    # Template Configuration
    templates:
      header: "strategic_analyst_header.md.j2"
      methodology: "strategic_analysis_guide.md.j2"
      polarities: "strategic_polarities_framework.md.j2"
      synthesis: "strategic_synthesis.md.j2"

    # Entity Type Compatibility
    applicable_entities:
      - domain
      - market_segment
      - strategy
      - research
    primary_entity: "domain"

    # Analysis Outputs
    deliverables:
      - strategic_context_analysis
      - market_opportunity_assessment
      - competitive_landscape_map
      - strategic_recommendations

  # Product Strategy Expert
  product_strategist:
    name: "Product Strategy Expert"
    description: "Customer research and problem validation specialist"
    icon: "🎯"
    version: "2.0.0"

    expertise:
      - customer_research
      - problem_definition
      - market_validation
      - competitive_analysis
      - solution_architecture
      - product_market_fit
      - go_to_market_strategy

    analysis_approach:
      methodology: "customer_centric_validation"
      focus_areas:
        - customer_problems
        - problem_solution_fit
        - market_validation
        - prioritization
        - actionable_definition
      evidence_requirements: "medium"
      validation_framework: "impact_urgency_feasibility"
      customer_focus: true

    persona:
      role: "Senior product strategist"
      specialization: "Enterprise technology solutions and customer problem analysis"
      background: "10+ years in B2B enterprise software product management"
      perspective: "Customer-centric problem-solution focus with market validation"

    templates:
      header: "product_strategist_header.md.j2"
      methodology: "product_analysis_guide.md.j2"
      validation: "problem_validation_framework.md.j2"
      prioritization: "problem_prioritization.md.j2"

    applicable_entities:
      - problem
      - product
      - solution
      - feature
    primary_entity: "problem"

    deliverables:
      - customer_problem_analysis
      - market_validation_report
      - solution_requirements
      - prioritization_framework

  # UX Research Expert
  ux_researcher:
    name: "UX Research Expert"
    description: "User behavior and organizational dynamics specialist"
    icon: "👤"
    version: "2.0.0"

    expertise:
      - user_research
      - persona_development
      - behavioral_analysis
      - organizational_dynamics
      - decision_influence_mapping
      - adoption_patterns
      - user_journey_analysis

    analysis_approach:
      methodology: "human_centered_behavioral"
      focus_areas:
        - user_behaviors
        - organizational_context
        - decision_influence
        - adoption_barriers
        - user_experience
      evidence_requirements: "medium"
      persona_framework: "role_based_behavioral"
      empathy_driven: true

    persona:
      role: "Senior UX researcher"
      specialization: "Enterprise software adoption and organizational behavior"
      background: "8+ years researching user behavior in complex organizational environments"
      perspective: "Human-centered design with deep organizational context understanding"

    templates:
      header: "ux_researcher_header.md.j2"
      methodology: "ux_analysis_guide.md.j2"
      personas: "behavioral_persona_framework.md.j2"
      journey: "user_journey_analysis.md.j2"

    applicable_entities:
      - persona
      - feature
      - research
    primary_entity: "persona"

    deliverables:
      - persona_behavioral_analysis
      - organizational_dynamics_map
      - decision_influence_network
      - adoption_journey_analysis

  # Technical Architecture Expert
  technical_architect:
    name: "Technical Architecture Expert"
    description: "System design and technical solution specialist"
    icon: "🏗️"
    version: "2.0.0"

    expertise:
      - system_architecture
      - technical_feasibility
      - integration_patterns
      - scalability_analysis
      - technology_selection
      - security_architecture
      - performance_optimization

    analysis_approach:
      methodology: "architecture_driven_design"
      focus_areas:
        - system_design
        - technical_constraints
        - integration_points
        - scalability_requirements
        - security_considerations
      evidence_requirements: "high"
      architecture_framework: "layered_systems_thinking"
      technical_rigor: true

    persona:
      role: "Senior technical architect"
      specialization: "Enterprise system design and technical solution architecture"
      background: "12+ years designing scalable enterprise systems and integration architectures"
      perspective: "Technical feasibility with system-wide architectural thinking"

    templates:
      header: "technical_architect_header.md.j2"
      methodology: "technical_analysis_guide.md.j2"
      architecture: "system_architecture_framework.md.j2"
      integration: "integration_analysis.md.j2"

    applicable_entities:
      - solution
      - integration
      - feature
    primary_entity: "solution"

    deliverables:
      - technical_feasibility_analysis
      - system_architecture_design
      - integration_requirements
      - technical_risk_assessment

  # Market Research Expert
  market_researcher:
    name: "Market Research Expert"
    description: "Competitive intelligence and market analysis specialist"
    icon: "🔍"
    version: "2.0.0"

    expertise:
      - competitive_intelligence
      - market_sizing
      - trend_analysis
      - customer_segmentation
      - adoption_patterns
      - industry_analysis
      - vendor_evaluation

    analysis_approach:
      methodology: "data_driven_market_analysis"
      focus_areas:
        - market_dynamics
        - competitive_landscape
        - customer_segments
        - adoption_trends
        - market_opportunities
      evidence_requirements: "high"
      research_framework: "mixed_methods_research"
      data_driven: true

    persona:
      role: "Senior market researcher"
      specialization: "B2B technology market intelligence and competitive analysis"
      background: "10+ years analyzing enterprise technology markets and competitive landscapes"
      perspective: "Data-driven market intelligence with competitive positioning focus"

    templates:
      header: "market_researcher_header.md.j2"
      methodology: "market_analysis_guide.md.j2"
      competitive: "competitive_analysis_framework.md.j2"
      segmentation: "market_segmentation.md.j2"

    applicable_entities:
      - market_segment
      - research
      - domain
      - strategy
    primary_entity: "research"

    deliverables:
      - market_analysis_report
      - competitive_landscape_analysis
      - customer_segmentation_study
      - market_opportunity_assessment

  # Business Development Expert
  business_development:
    name: "Business Development Expert"
    description: "Partnership and go-to-market strategy specialist"
    icon: "🤝"
    version: "2.0.0"

    expertise:
      - partnership_strategy
      - go_to_market_planning
      - channel_development
      - business_model_design
      - revenue_optimization
      - strategic_alliances
      - market_entry_strategies

    analysis_approach:
      methodology: "partnership_driven_growth"
      focus_areas:
        - partnership_opportunities
        - channel_strategies
        - revenue_models
        - market_entry
        - strategic_alliances
      evidence_requirements: "medium"
      growth_framework: "sustainable_scalable_partnerships"
      relationship_focused: true

    applicable_entities:
      - strategy
      - initiative
      - integration
    primary_entity: "strategy"

# Optional Core Fallback Entity-Expert Mappings
# Package-local experts remain the default resolution source.
entity_expert_mappings:
  domain:
    primary: "strategic_analyst"
    secondary: ["market_researcher"]
    specialist: []

  problem:
    primary: "product_strategist"
    secondary: ["ux_researcher", "market_researcher"]
    specialist: []

  persona:
    primary: "ux_researcher"
    secondary: ["product_strategist", "market_researcher"]
    specialist: []

  product:
    primary: "product_strategist"
    secondary: ["ux_researcher", "technical_architect"]
    specialist: []

  solution:
    primary: "technical_architect"
    secondary: ["product_strategist"]
    specialist: ["ux_researcher"]

  feature:
    primary: "technical_architect"
    secondary: ["ux_researcher", "product_strategist"]
    specialist: []

  market_segment:
    primary: "market_researcher"
    secondary: ["strategic_analyst", "ux_researcher"]
    specialist: []

  research:
    primary: "market_researcher"
    secondary: ["strategic_analyst"]
    specialist: []

  strategy:
    primary: "strategic_analyst"
    secondary: ["business_development", "market_researcher"]
    specialist: []

  initiative:
    primary: "business_development"
    secondary: ["strategic_analyst", "product_strategist"]
    specialist: []

  integration:
    primary: "technical_architect"
    secondary: ["product_strategist"]
    specialist: []

# Multi-Expert Workflow Definitions
expert_workflows:
  comprehensive_domain_analysis:
    description: "Multi-phase domain analysis with expert synthesis"
    phases:
      - name: "strategic_assessment"
        expert: "strategic_analyst"
        deliverable: "strategic_context_analysis"
        duration: "primary"
      - name: "market_validation"
        expert: "market_researcher"
        deliverable: "market_opportunity_assessment"
        duration: "secondary"
        depends_on: ["strategic_assessment"]
      - name: "synthesis"
        experts: ["strategic_analyst", "market_researcher"]
        deliverable: "comprehensive_domain_analysis"
        duration: "synthesis"
        synthesis: true

  solution_design_validation:
    description: "Technical and market validation for solution design"
    phases:
      - name: "technical_feasibility"
        expert: "technical_architect"
        deliverable: "technical_feasibility_analysis"
      - name: "market_validation"
        expert: "product_strategist"
        deliverable: "solution_market_validation"
      - name: "user_acceptance"
        expert: "ux_researcher"
        deliverable: "user_acceptance_analysis"
      - name: "integration_review"
        experts: ["technical_architect", "product_strategist", "ux_researcher"]
        deliverable: "integrated_solution_assessment"
        synthesis: true

  persona_development_deep_dive:
    description: "Comprehensive persona development with behavioral analysis"
    phases:
      - name: "behavioral_analysis"
        expert: "ux_researcher"
        deliverable: "behavioral_persona_analysis"
      - name: "market_context"
        expert: "market_researcher"
        deliverable: "persona_market_context"
      - name: "product_implications"
        expert: "product_strategist"
        deliverable: "persona_product_implications"
      - name: "persona_synthesis"
        experts: ["ux_researcher", "market_researcher", "product_strategist"]
        deliverable: "comprehensive_persona_definition"
        synthesis: true

# Global Expert System Configuration
expert_system_config:
  default_expert_selection: "primary"
  multi_expert_synthesis: true
  evidence_integration: true
  confidence_tracking: true
  expert_specialization_enforcement: true

  # Template Processing
  template_variables:
    global_expert_context:
      - expert_name
      - expert_role
      - specialization
      - methodology
      - focus_areas
      - entity_type
      - entity_context

  # Analysis Quality Assurance
  quality_assurance:
    evidence_requirements_enforcement: true
    methodology_consistency_checking: true
    expert_deliverable_validation: true
    cross_expert_synthesis_validation: true
