# Constitution Entity Type Definition

entity_type:
  type_key: "constitution"
  namespace: "org.collaborative"
  id_prefix: "CONST"
  name_field: "constitution_name"
  slug_field: "constitution_slug"
  display_name: "Constitution"
  description: "Foundational governing documents and principles"

  template_bundle:
    create: "create.md.j2"
    analyze: "analyze.md.j2"

  template_version: "1.0.0"

  directory_name: "constitution"
  filename_pattern: "{entity_type}.md"
  nesting_strategy: "root"

  # Constitution is expected to start as a lightweight draft and mature over time.
  required_fields:
    - "constitution_name"
    - "version"
    - "constitution_state"  # draft | provisional | ratified

  optional_fields:
    - "ratification_date"
    - "problem_statement"
    - "organizational_purpose"
    - "principles"
    - "open_questions"
    - "amendment_log"

  unique_fields:
    - "constitution_slug"

  context_level: 1
  list_command: true
  get_command: true
  create_command: true
  analyze_command: true
